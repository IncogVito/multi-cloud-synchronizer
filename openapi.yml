openapi: 3.0.1
info:
  title: Multi-Cloud Synchronizer API
  description: "API for managing photos, accounts, folders and device status"
  version: 1.0.0
paths:
  /api/accounts:
    get:
      tags:
      - Accounts
      summary: List accounts
      operationId: listAccounts
      responses:
        "200":
          description: List of iCloud accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountResponse"
  /api/accounts/2fa:
    post:
      tags:
      - Accounts
      summary: Submit 2FA code
      operationId: twoFa
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFaRequest"
        required: true
      responses:
        "200":
          description: 2FA verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFaResponse"
  /api/accounts/login:
    post:
      tags:
      - Accounts
      summary: Login
      description: Authenticate with iCloud credentials
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: Login successful or 2FA required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
  /api/accounts/{id}:
    delete:
      tags:
      - Accounts
      summary: Delete account
      operationId: deleteAccount
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "204":
          description: Account deleted
  /api/accounts/{id}/reorganize:
    post:
      operationId: reorganize
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: dryRun
        in: query
        required: true
        schema:
          type: boolean
          default: true
      responses:
        "200":
          description: reorganize 200 response
          content:
            application/json:
              schema:
                type: object
  /api/accounts/{id}/status:
    get:
      tags:
      - Accounts
      summary: Get account session status
      operationId: getAccountStatus
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Account found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"
        "404":
          description: Account not found
  /api/accounts/{id}/sync-config:
    put:
      operationId: saveSyncConfig
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncConfigRequest"
        required: true
      responses:
        "200":
          description: saveSyncConfig 200 response
          content:
            application/json:
              schema:
                type: object
  /api/agent/detect-drive:
    post:
      tags:
      - Agent
      summary: Detect and mount drive
      description: Runs the AI disk detection agent and streams SSE step events
      operationId: detectDrive
      responses:
        "200":
          description: SSE stream with agent steps
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/Event_AgentStepEvent_"
  /api/context:
    get:
      operationId: getActive
      responses:
        "200":
          description: getActive 200 response
          content:
            application/json:
              schema:
                type: object
    post:
      operationId: setContext
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
        required: true
      responses:
        "200":
          description: setContext 200 response
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: clear
      responses:
        "200":
          description: clear 200 response
          content:
            application/json:
              schema:
                type: object
  /api/context/browse:
    get:
      operationId: browse
      parameters:
      - name: path
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: browse 200 response
          content:
            application/json:
              schema:
                type: object
  /api/context/mkdir:
    post:
      operationId: mkdir
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
        required: true
      responses:
        "200":
          description: mkdir 200 response
          content:
            application/json:
              schema:
                type: object
  /api/disk-index/events:
    get:
      operationId: events
      responses:
        "200":
          description: events 200 response
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/Event_DiskIndexProgressEvent_"
  /api/disk-index/reorganize:
    post:
      operationId: reorganize_1
      responses:
        "200":
          description: reorganize_1 200 response
          content:
            application/json:
              schema:
                type: object
  /api/disk-index/reorganize-preview:
    get:
      operationId: reorganizePreview
      responses:
        "200":
          description: reorganizePreview 200 response
          content:
            application/json:
              schema:
                type: object
  /api/disk-index/start:
    post:
      operationId: startIndexing
      responses:
        "200":
          description: startIndexing 200 response
          content:
            application/json:
              schema:
                type: object
  /api/disk-index/status:
    get:
      operationId: status
      responses:
        "200":
          description: status 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiskIndexProgressEvent"
  /api/folders:
    get:
      tags:
      - Folders
      summary: Get folder tree
      operationId: getFolderTree
      responses:
        "200":
          description: Folder hierarchy
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FolderResponse"
    post:
      tags:
      - Folders
      summary: Create folder
      operationId: createFolder
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFolderRequest"
        required: true
      responses:
        "201":
          description: Folder created
  /api/folders/auto-organize:
    post:
      tags:
      - Folders
      summary: Auto-organize photos into year/month folders
      operationId: autoOrganize
      parameters:
      - name: granularity
        in: query
        required: true
        schema:
          type: string
          default: YEAR
      responses:
        "200":
          description: Organization done
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
  /api/folders/{id}:
    put:
      tags:
      - Folders
      summary: Update folder
      operationId: updateFolder
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFolderRequest"
        required: true
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderResponse"
        "404":
          description: Not found
    delete:
      tags:
      - Folders
      summary: Delete folder
      operationId: deleteFolder
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
  /api/folders/{id}/photos:
    get:
      tags:
      - Folders
      summary: List photos in folder
      operationId: getPhotosInFolder
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Photos in folder
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PhotoResponse"
    post:
      tags:
      - Folders
      summary: Assign photos to folder
      operationId: assignPhotos
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchPhotoRequest"
        required: true
      responses:
        "200":
          description: Photos assigned
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/health:
    get:
      tags:
      - Health
      summary: Health check
      operationId: health
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthController.HealthResponse"
  /api/jobs:
    get:
      tags:
      - Jobs
      summary: List all active and recent jobs
      operationId: listJobs
      responses:
        "200":
          description: listJobs 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobsListResponse"
  /api/jobs/history:
    get:
      tags:
      - Jobs
      summary: List task history (paginated)
      operationId: listHistory
      parameters:
      - name: page
        in: query
        required: true
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: true
        schema:
          type: integer
          format: int32
          default: 20
      - name: type
        in: query
        schema:
          type: string
          nullable: true
      - name: status
        in: query
        schema:
          type: string
          nullable: true
      responses:
        "200":
          description: listHistory 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskHistoryPageDto"
  /api/jobs/history/{taskId}:
    get:
      tags:
      - Jobs
      summary: Get task history detail by ID
      operationId: getTaskDetail
      parameters:
      - name: taskId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: getTaskDetail 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskHistoryDetailDto"
  /api/jobs/{jobId}/progress:
    get:
      tags:
      - Jobs
      summary: Stream progress for any job type by ID (SSE)
      operationId: getJobProgress
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: getJobProgress 200 response
          content:
            text/event-stream:
              schema:
                type: object
  /api/photos:
    get:
      tags:
      - Photos
      summary: List photos
      description: Returns paginated photos with optional filters. Use yearMonth (YYYY-MM)
        or year (YYYY) to scope to a specific time range.
      operationId: listPhotos
      parameters:
      - name: accountId
        in: query
        required: true
        schema:
          type: string
      - name: synced
        in: query
        required: true
        schema:
          type: string
      - name: storageDeviceId
        in: query
        required: true
        schema:
          type: string
      - name: yearMonth
        in: query
        required: true
        schema:
          type: string
      - name: year
        in: query
        required: true
        schema:
          type: string
      - name: page
        in: query
        required: true
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: true
        schema:
          type: integer
          format: int32
          default: 20
      responses:
        "200":
          description: Photo list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhotoListResponse"
  /api/photos/deletion-jobs:
    post:
      tags:
      - Deletion Jobs
      summary: Start a batch deletion job
      operationId: startDeletionJob
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeletionJobRequest"
        required: true
      responses:
        "200":
          description: startDeletionJob 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletionJobStartResponse"
  /api/photos/deletion-jobs/{jobId}:
    get:
      tags:
      - Deletion Jobs
      summary: Get deletion job status
      operationId: getDeletionJob
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: getDeletionJob 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletionProgress"
    delete:
      tags:
      - Deletion Jobs
      summary: Cancel a deletion job
      operationId: cancelDeletionJob
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: cancelDeletionJob 200 response
  /api/photos/deletion-jobs/{jobId}/progress:
    get:
      tags:
      - Deletion Jobs
      summary: Stream deletion job progress (SSE)
      operationId: getDeletionJobProgress
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: getDeletionJobProgress 200 response
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/Event_DeletionProgress_"
  /api/photos/icloud:
    delete:
      tags:
      - Photos
      summary: Delete photos from iCloud (deprecated)
      description: Use POST /api/photos/deletion-jobs instead
      operationId: deleteFromICloud
      responses:
        "410":
          description: Gone — use deletion-jobs endpoint
  /api/photos/iphone:
    delete:
      tags:
      - Photos
      summary: Delete photos from iPhone (deprecated)
      description: Use POST /api/photos/deletion-jobs instead
      operationId: deleteFromIPhone
      responses:
        "410":
          description: Gone — use deletion-jobs endpoint
  /api/photos/missing-thumbnails-count:
    get:
      tags:
      - Photos
      summary: Count photos missing thumbnails
      operationId: countMissingThumbnails
      parameters:
      - name: storageDeviceId
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Count of synced photos without thumbnail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MissingThumbnailsCount"
  /api/photos/months-summary:
    get:
      tags:
      - Photos
      summary: Photos grouped by month
      description: "Returns photo counts and size totals per calendar month, sorted\
        \ newest-first"
      operationId: getMonthsSummary
      parameters:
      - name: storageDeviceId
        in: query
        required: true
        schema:
          type: string
      - name: accountId
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Month summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthSummaryResponse"
  /api/photos/sprite-manifest:
    post:
      tags:
      - Photos
      summary: Build sprite sheet manifest for a batch of photos
      operationId: getSpriteManifest
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpriteManifestRequest"
        required: true
      responses:
        "200":
          description: Sprite manifest with slot positions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpriteManifest"
  /api/photos/sprites/{spriteId}:
    get:
      tags:
      - Photos
      summary: Get sprite sheet image
      operationId: getSprite
      parameters:
      - name: spriteId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: JPEG sprite sheet
          content:
            image/jpeg:
              schema:
                type: array
                items:
                  type: string
                  format: byte
        "404":
          description: Sprite not found
  /api/photos/thumbnail-jobs:
    post:
      tags:
      - Photos
      summary: Start thumbnail generation job
      description: Returns jobId immediately. Job runs server-side and survives page
        navigation.
      operationId: startThumbnailJob
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateThumbnailsRequest"
        required: true
      responses:
        "200":
          description: Job started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThumbnailJobResponse"
  /api/photos/thumbnail-jobs/{jobId}:
    delete:
      tags:
      - Photos
      summary: Cancel thumbnail generation job
      operationId: cancelThumbnailJob
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
      responses:
        "204":
          description: Cancelled
  /api/photos/thumbnail-jobs/{jobId}/progress:
    get:
      tags:
      - Photos
      summary: Stream thumbnail job progress (SSE)
      description: "Reconnect-safe: replays all past progress events on reconnect."
      operationId: getThumbnailJobProgress
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: SSE progress stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/Event_ThumbnailProgress_"
        "404":
          description: Job not found
  /api/photos/{id}:
    get:
      tags:
      - Photos
      summary: Get photo details
      operationId: getPhoto
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Photo found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhotoResponse"
        "404":
          description: Photo not found
  /api/photos/{id}/full:
    get:
      tags:
      - Photos
      summary: Get full photo from disk
      operationId: getFullPhoto
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Photo binary
          content:
            application/octet-stream:
              schema:
                type: array
                items:
                  type: string
                  format: byte
        "404":
          description: Photo not found
  /api/photos/{id}/thumbnail:
    get:
      tags:
      - Photos
      summary: Get photo thumbnail
      operationId: getThumbnail
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: JPEG thumbnail
          content:
            image/jpeg:
              schema:
                type: array
                items:
                  type: string
                  format: byte
        "404":
          description: Photo not found
  /api/setup/browse:
    get:
      operationId: browse_1
      parameters:
      - name: path
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: browse_1 200 response
          content:
            application/json:
              schema:
                type: object
  /api/setup/disks:
    get:
      operationId: listDisks
      responses:
        "200":
          description: listDisks 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiskSetupService.DiskInfo"
  /api/setup/mount:
    post:
      operationId: mount
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
        required: true
      responses:
        "200":
          description: mount 200 response
          content:
            application/json:
              schema:
                type: object
  /api/setup/scan:
    get:
      operationId: scan
      parameters:
      - name: path
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: scan 200 response
          content:
            application/json:
              schema:
                type: object
  /api/setup/status:
    get:
      operationId: getStatus
      responses:
        "200":
          description: getStatus 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiskSetupService.DriveStatus"
  /api/setup/unmount:
    post:
      operationId: unmount
      responses:
        "200":
          description: unmount 200 response
          content:
            application/json:
              schema:
                type: object
  /api/stats/overview:
    get:
      tags:
      - Stats
      summary: Get storage statistics
      description: "Returns photo counts and sizes for disk, iCloud and iPhone within\
        \ a storage device context"
      operationId: getOverview
      parameters:
      - name: storageDeviceId
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Stats overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"
  /api/status/check-drive:
    post:
      tags:
      - Status
      summary: Check external drive
      description: Streams SSE events with drive detection steps
      operationId: checkDrive
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/Event_DeviceCheckEvent_"
  /api/status/check-icloud:
    post:
      tags:
      - Status
      summary: Check iCloud connectivity
      description: Streams SSE events with iCloud check steps
      operationId: checkICloud
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/Event_DeviceCheckEvent_"
  /api/status/check-iphone:
    post:
      tags:
      - Status
      summary: Check iPhone
      description: Streams SSE events with iPhone detection steps
      operationId: checkIPhone
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/Event_DeviceCheckEvent_"
  /api/status/devices:
    get:
      tags:
      - Status
      summary: Get device statuses
      operationId: getDeviceStatuses
      responses:
        "200":
          description: List of device statuses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeviceStatusResponse"
  /api/status/iphone/unmount:
    post:
      tags:
      - Status
      summary: Unmount iPhone
      description: Unmounts the iPhone from the FUSE mount point
      operationId: unmountIPhone
      responses:
        "200":
          description: Unmount result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/sync/{accountId}:
    post:
      operationId: startSync
      parameters:
      - name: accountId
        in: path
        required: true
        schema:
          type: string
      - name: provider
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/ProviderType"
      responses:
        "200":
          description: startSync 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStartResponse"
    delete:
      operationId: cancelSync
      parameters:
      - name: accountId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: cancelSync 200 response
  /api/sync/{accountId}/confirm:
    post:
      operationId: confirmSync
      parameters:
      - name: accountId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: confirmSync 200 response
  /api/sync/{accountId}/events:
    get:
      operationId: syncEvents
      parameters:
      - name: accountId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: syncEvents 200 response
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/Event_SyncProgressEvent_"
  /api/sync/{accountId}/reorganize:
    post:
      operationId: reorganize_2
      parameters:
      - name: accountId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: reorganize_2 200 response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/sync/{accountId}/reorganize-preview:
    get:
