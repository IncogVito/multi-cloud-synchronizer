openapi: 3.0.1
info:
  title: Multi-Cloud Synchronizer API
  description: "API for managing photos, accounts, folders and device status"
  version: 1.0.0
paths:
  /api/accounts:
    get:
      tags:
      - Accounts
      summary: List accounts
      operationId: listAccounts
      responses:
        "200":
          description: List of iCloud accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountResponse"
  /api/accounts/2fa:
    post:
      tags:
      - Accounts
      summary: Submit 2FA code
      operationId: twoFa
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFaRequest"
        required: true
      responses:
        "200":
          description: 2FA verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFaResponse"
  /api/accounts/login:
    post:
      tags:
      - Accounts
      summary: Login
      description: Authenticate with iCloud credentials
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: Login successful or 2FA required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
  /api/accounts/{id}:
    delete:
      tags:
      - Accounts
      summary: Delete account
      operationId: deleteAccount
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "204":
          description: Account deleted
  /api/accounts/{id}/reorganize:
    post:
      operationId: reorganize
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: dryRun
        in: query
        required: true
        schema:
          type: boolean
          default: true
      responses:
        "200":
          description: reorganize 200 response
          content:
            application/json:
              schema:
                type: object
  /api/accounts/{id}/status:
    get:
      tags:
      - Accounts
      summary: Get account session status
      operationId: getAccountStatus
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Account found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"
        "404":
          description: Account not found
  /api/accounts/{id}/sync-config:
    put:
      operationId: saveSyncConfig
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncConfigRequest"
        required: true
      responses:
        "200":
          description: saveSyncConfig 200 response
          content:
            application/json:
              schema:
                type: object
  /api/agent/detect-drive:
    post:
      tags:
      - Agent
      summary: Detect and mount drive
      description: Runs the AI disk detection agent and streams SSE step events
      operationId: detectDrive
      responses:
        "200":
          description: SSE stream with agent steps
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/Event_AgentStepEvent_"
  /api/context:
    get:
      operationId: getActive
      responses:
        "200":
          description: getActive 200 response
          content:
            application/json:
              schema:
                type: object
    post:
      operationId: setContext
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
        required: true
      responses:
        "200":
          description: setContext 200 response
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: clear
      responses:
        "200":
          description: clear 200 response
          content:
            application/json:
              schema:
                type: object
  /api/context/browse:
    get:
      operationId: browse
      parameters:
      - name: path
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: browse 200 response
          content:
            application/json:
              schema:
                type: object
  /api/context/mkdir:
    post:
      operationId: mkdir
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
        required: true
      responses:
        "200":
          description: mkdir 200 response
          content:
            application/json:
              schema:
                type: object
  /api/disk-index/events:
    get:
      operationId: events
      responses:
        "200":
          description: events 200 response
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/Event_DiskIndexProgressEvent_"
  /api/disk-index/reorganize:
    post:
      operationId: reorganize_1
      responses:
        "200":
          description: reorganize_1 200 response
          content:
            application/json:
              schema:
                type: object
  /api/disk-index/reorganize-preview:
    get:
      operationId: reorganizePreview
      responses:
        "200":
          description: reorganizePreview 200 response
          content:
            application/json:
              schema:
                type: object
  /api/disk-index/start:
    post:
      operationId: startIndexing
      responses:
        "200":
          description: startIndexing 200 response
          content:
            application/json:
              schema:
                type: object
  /api/disk-index/status:
    get:
      operationId: status
      responses:
        "200":
          description: status 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiskIndexProgressEvent"
  /api/folders:
    get:
      tags:
      - Folders
      summary: Get folder tree
      operationId: getFolderTree
      responses:
        "200":
          description: Folder hierarchy
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FolderResponse"
    post:
      tags:
      - Folders
      summary: Create folder
      operationId: createFolder
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFolderRequest"
        required: true
      responses:
        "201":
          description: Folder created
  /api/folders/auto-organize:
    post:
      tags:
      - Folders
      summary: Auto-organize photos into year/month folders
      operationId: autoOrganize
      parameters:
      - name: granularity
        in: query
        required: true
        schema:
          type: string
          default: YEAR
      responses:
        "200":
          description: Organization done
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
  /api/folders/{id}:
    put:
      tags:
      - Folders
      summary: Update folder
      operationId: updateFolder
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFolderRequest"
        required: true
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderResponse"
        "404":
          description: Not found
    delete:
      tags:
      - Folders
      summary: Delete folder
      operationId: deleteFolder
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
  /api/folders/{id}/photos:
    get:
      tags:
      - Folders
      summary: List photos in folder
      operationId: getPhotosInFolder
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Photos in folder
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PhotoResponse"
    post:
      tags:
      - Folders
      summary: Assign photos to folder
      operationId: assignPhotos
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchPhotoRequest"
        required: true
      responses:
        "200":
          description: Photos assigned
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/health:
    get:
      tags:
      - Health
      summary: Health check
      operationId: health
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthController.HealthResponse"
  /api/photos:
    get:
      tags:
      - Photos
      summary: List photos
      description: Returns paginated photos with optional filters. Use yearMonth (YYYY-MM)
        or year (YYYY) to scope to a specific time range.
      operationId: listPhotos
      parameters:
      - name: accountId
        in: query
        required: true
        schema:
          type: string
      - name: synced
        in: query
        required: true
        schema:
          type: string
      - name: storageDeviceId
        in: query
        required: true
        schema:
          type: string
      - name: yearMonth
        in: query
        required: true
        schema:
          type: string
      - name: year
        in: query
        required: true
        schema:
          type: string
      - name: page
        in: query
        required: true
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: true
        schema:
          type: integer
          format: int32
          default: 20
      responses:
        "200":
          description: Photo list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhotoListResponse"
  /api/photos/generate-thumbnails:
    post:
      tags:
      - Photos
      summary: Generate missing thumbnails
      description: Async SSE stream with progress events
      operationId: generateThumbnails
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateThumbnailsRequest"
        required: true
      responses:
        "200":
          description: SSE progress stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/Event_ThumbnailProgress_"
  /api/photos/icloud:
    delete:
      tags:
      - Photos
      summary: Delete photos from iCloud
      description: Batch delete; photos must already be synced to disk
      operationId: deleteFromICloud
      parameters:
      - name: accountId
        in: query
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchPhotoRequest"
        required: true
      responses:
        "204":
          description: Deleted
  /api/photos/iphone:
    delete:
      tags:
      - Photos
      summary: Delete photos from iPhone
      description: Batch delete; photos must already be synced to disk
      operationId: deleteFromIPhone
      parameters:
      - name: accountId
        in: query
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchPhotoRequest"
        required: true
      responses:
        "204":
          description: Deleted
  /api/photos/missing-thumbnails-count:
    get:
      tags:
      - Photos
      summary: Count photos missing thumbnails
      operationId: countMissingThumbnails
      parameters:
      - name: storageDeviceId
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Count of synced photos without thumbnail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MissingThumbnailsCount"
  /api/photos/months-summary:
    get:
      tags:
      - Photos
      summary: Photos grouped by month
      description: "Returns photo counts and size totals per calendar month, sorted\
        \ newest-first"
      operationId: getMonthsSummary
      parameters:
      - name: storageDeviceId
        in: query
        required: true
        schema:
          type: string
      - name: accountId
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Month summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthSummaryResponse"
  /api/photos/{id}:
    get:
      tags:
      - Photos
      summary: Get photo details
      operationId: getPhoto
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Photo found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhotoResponse"
        "404":
          description: Photo not found
  /api/photos/{id}/full:
    get:
      tags:
      - Photos
      summary: Get full photo from disk
      operationId: getFullPhoto
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Photo binary
          content:
            application/octet-stream:
              schema:
                type: array
                items:
                  type: string
                  format: byte
        "404":
          description: Photo not found
  /api/photos/{id}/thumbnail:
    get:
      tags:
      - Photos
      summary: Get photo thumbnail
      operationId: getThumbnail
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: JPEG thumbnail
          content:
            image/jpeg:
              schema:
                type: array
                items:
                  type: string
                  format: byte
        "404":
          description: Photo not found
  /api/setup/browse:
    get:
      operationId: browse_1
      parameters:
      - name: path
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: browse_1 200 response
          content:
            application/json:
              schema:
                type: object
  /api/setup/disks:
    get:
      operationId: listDisks
      responses:
        "200":
          description: listDisks 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiskSetupService.DiskInfo"
  /api/setup/mount:
    post:
      operationId: mount
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
        required: true
      responses:
        "200":
          description: mount 200 response
          content:
            application/json:
              schema:
                type: object
  /api/setup/scan:
    get:
      operationId: scan
      parameters:
      - name: path
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: scan 200 response
          content:
            application/json:
              schema:
                type: object
  /api/setup/status:
    get:
      operationId: getStatus
      responses:
        "200":
          description: getStatus 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiskSetupService.DriveStatus"
  /api/setup/unmount:
    post:
      operationId: unmount
      responses:
        "200":
          description: unmount 200 response
          content:
            application/json:
              schema:
                type: object
  /api/stats/overview:
    get:
      tags:
      - Stats
      summary: Get storage statistics
      description: "Returns photo counts and sizes for disk, iCloud and iPhone within\
        \ a storage device context"
      operationId: getOverview
      parameters:
      - name: storageDeviceId
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Stats overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"
  /api/status/check-drive:
    post:
      tags:
      - Status
      summary: Check external drive
      description: Streams SSE events with drive detection steps
      operationId: checkDrive
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/Event_DeviceCheckEvent_"
  /api/status/check-icloud:
    post:
      tags:
      - Status
      summary: Check iCloud connectivity
      description: Streams SSE events with iCloud check steps
      operationId: checkICloud
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/Event_DeviceCheckEvent_"
  /api/status/check-iphone:
    post:
      tags:
      - Status
      summary: Check iPhone
      description: Streams SSE events with iPhone detection steps
      operationId: checkIPhone
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/Event_DeviceCheckEvent_"
  /api/status/devices:
    get:
      tags:
      - Status
      summary: Get device statuses
      operationId: getDeviceStatuses
      responses:
        "200":
          description: List of device statuses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeviceStatusResponse"
  /api/status/iphone/unmount:
    post:
      tags:
      - Status
      summary: Unmount iPhone
      description: Unmounts the iPhone from the FUSE mount point
      operationId: unmountIPhone
      responses:
        "200":
          description: Unmount result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/sync/{accountId}:
    post:
      operationId: startSync
      parameters:
      - name: accountId
        in: path
        required: true
        schema:
          type: string
      - name: provider
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/ProviderType"
      responses:
        "200":
          description: startSync 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStartResponse"
    delete:
      operationId: cancelSync
      parameters:
      - name: accountId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: cancelSync 200 response
  /api/sync/{accountId}/confirm:
    post:
      operationId: confirmSync
      parameters:
      - name: accountId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: confirmSync 200 response
  /api/sync/{accountId}/events:
    get:
      operationId: syncEvents
      parameters:
      - name: accountId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: syncEvents 200 response
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/Event_SyncProgressEvent_"
  /api/sync/{accountId}/reorganize:
    post:
      operationId: reorganize_2
      parameters:
      - name: accountId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: reorganize_2 200 response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/sync/{accountId}/reorganize-preview:
    get:
      operationId: reorganizePreview_1
      parameters:
      - name: accountId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: reorganizePreview_1 200 response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/sync/{accountId}/status:
    get:
      operationId: getSyncStatus
      parameters:
      - name: accountId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: getSyncStatus 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncProgressEvent"
components:
  schemas:
    AccountResponse:
      required:
      - appleId
      - createdAt
      - displayName
      - hasActiveSession
      - id
      - lastSyncAt
      type: object
      properties:
        id:
          type: string
        appleId:
          type: string
        displayName:
          type: string
        hasActiveSession:
          type: boolean
        lastSyncAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
    AgentStepEvent:
      required:
      - action
      - message
      - result
      - step
      - success
      type: object
      properties:
        step: {}
        action:
          type: string
        result:
          type: string
        success:
          type: boolean
        message:
          type: string
    BatchPhotoRequest:
      required:
      - photoIds
      type: object
      properties:
        photoIds:
          type: array
          items:
            type: string
    CreateFolderRequest:
      required:
      - folderType
      - name
      - parentId
      - sortOrder
      type: object
      properties:
        name:
          type: string
        parentId:
          type: string
        folderType:
          type: string
        sortOrder:
          type: integer
          format: int32
    DeviceCheckEvent:
      required:
      - details
      - deviceType
      - status
      - stepDescription
      - terminal
      type: object
      properties:
        deviceType:
          type: string
        status:
          type: string
        stepDescription:
          type: string
        details:
          type: string
        terminal:
          type: boolean
    DeviceStatusResponse:
      required:
      - connected
      - details
      - deviceType
      - id
      - lastCheckedAt
      - mounted
      - status
      type: object
      properties:
        id:
          type: string
        deviceType:
          type: string
        status:
          type: string
        connected:
          type: boolean
        lastCheckedAt:
          type: string
          format: date-time
        details:
          type: string
        mounted:
          type: boolean
    DiskIndexProgressEvent:
      type: object
      properties:
        phase:
          type: string
        scanned:
          type: integer
          format: int32
        total:
          type: integer
          format: int32
        percentComplete:
          type: number
          format: double
        error:
          type: string
        newlyDeleted:
          type: integer
          format: int32
    DiskSetupService.DiskInfo:
      required:
      - label
      - model
      - mountpoint
      - name
      - path
      - size
      - type
      - vendor
      type: object
      properties:
        name:
          type: string
        path:
          type: string
        size:
          type: string
        type:
          type: string
        mountpoint:
          type: string
        label:
          type: string
        vendor:
          type: string
        model:
          type: string
    DiskSetupService.DriveStatus:
      required:
      - deviceId
      - drivePath
      - drivePathHost
      - freeBytes
      - label
      - mounted
      type: object
      properties:
        mounted:
          type: boolean
        drivePath:
          type: string
        drivePathHost:
          type: string
        freeBytes:
          type: integer
          format: int64
        deviceId:
          type: string
        label:
          type: string
    Event_AgentStepEvent_:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/AgentStepEvent"
        id:
          type: string
        name:
          type: string
        comment:
          type: string
        retry:
          type: string
    Event_DeviceCheckEvent_:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/DeviceCheckEvent"
        id:
          type: string
        name:
          type: string
        comment:
          type: string
        retry:
          type: string
    Event_DiskIndexProgressEvent_:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/DiskIndexProgressEvent"
        id:
          type: string
        name:
          type: string
        comment:
          type: string
        retry:
          type: string
    Event_SyncProgressEvent_:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/SyncProgressEvent"
        id:
          type: string
        name:
          type: string
        comment:
          type: string
        retry:
          type: string
    Event_ThumbnailProgress_:
      type: object
      properties:
        data:
