version: '3.8'

# Production compose – uses pre-built images from the registry.
# Rendered on the server by the GitHub Actions deploy workflow,
# which writes a .env file with the image tags and secrets.

services:
  backend:
    image: ${BACKEND_IMAGE}
    container_name: cloud-synchronizer-backend
    restart: unless-stopped
    environment:
      - MICRONAUT_ENVIRONMENTS=docker
      - APP_USERNAME=${APP_USERNAME:-admin}
      - APP_PASSWORD=${APP_PASSWORD}
      - ICLOUD_SERVICE_URL=${ICLOUD_SERVICE_URL}
      - EXTERNAL_DRIVE_PATH_HOST=${EXTERNAL_DRIVE_PATH_HOST}
      - EXTERNAL_DRIVE_PATH_CONTAINER=${EXTERNAL_DRIVE_PATH_CONTAINER}
      - IPHONE_CONTAINER_PATH=${IPHONE_MOUNT_PATH_CONTAINER}
      - IPHONE_HOST_MOUNT_PATH=${IPHONE_HOST_MOUNT_PATH}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-google/gemini-2.0-flash-001}
      - HOST_AGENT_SOCKET=${HOST_AGENT_SOCKET:-/run/cloudsync-host-agent/agent.sock}
    volumes:
      - type: bind
        source: ${DB_PATH_HOST}
        target: /data
        bind:
          create_host_path: true
      - type: bind
        source: ${EXTERNAL_DRIVE_PATH_HOST}
        target: ${EXTERNAL_DRIVE_PATH_CONTAINER}
        bind:
          create_host_path: true
          propagation: rshared
      - type: bind
        source: ${IPHONE_MOUNT_PATH_HOST}
        target: ${IPHONE_MOUNT_PATH_CONTAINER}
        bind:
          create_host_path: true
          propagation: rshared
      - /run/cloudsync-host-agent:/run/cloudsync-host-agent:ro
    networks:
      - cloud-sync-net
    depends_on:
      icloud-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  icloud-service:
    image: ${ICLOUD_SERVICE_IMAGE}
    container_name: cloud-synchronizer-icloud-service
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
    volumes:
      - icloud-data:/data
    networks:
      - cloud-sync-net
    # Not exposed externally – backend-only consumer
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: cloud-synchronizer-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    networks:
      - cloud-sync-net
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  icloud-data:
    driver: local
    name: cloud-sync-icloud-data

networks:
  cloud-sync-net:
    driver: bridge

