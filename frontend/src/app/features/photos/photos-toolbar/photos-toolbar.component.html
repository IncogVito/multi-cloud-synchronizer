<div class="toolbar">
  <div class="toolbar-left">
    <div class="seg seg--2" [attr.data-active]="granularityIdx()" role="tablist" aria-label="Granulacja">
      <div class="seg-track"><div class="seg-indicator"></div></div>
      <button
        class="seg-btn"
        role="tab"
        [class.active]="granularity() === 'year'"
        [attr.aria-selected]="granularity() === 'year'"
        (click)="setGranularity('year')"
      >
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/>
          <path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/>
          <path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/>
        </svg>
        <span>Year</span>
      </button>
      <button
        class="seg-btn"
        role="tab"
        [class.active]="granularity() === 'month'"
        [attr.aria-selected]="granularity() === 'month'"
        (click)="setGranularity('month')"
      >
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/>
        </svg>
        <span>Month</span>
      </button>
    </div>

    <div class="seg seg--3" [attr.data-active]="sourceIdx()" role="tablist" aria-label="Źródło">
      <div class="seg-track"><div class="seg-indicator"></div></div>
      <button
        class="seg-btn"
        role="tab"
        [class.active]="sourceFilter() === 'all'"
        [attr.aria-selected]="sourceFilter() === 'all'"
        (click)="setSourceFilter('all')"
      >
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/>
          <path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/>
          <path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/>
        </svg>
        <span>All</span>
      </button>
      <button
        class="seg-btn seg-btn--icloud"
        role="tab"
        [class.active]="sourceFilter() === 'icloud'"
        [attr.aria-selected]="sourceFilter() === 'icloud'"
        (click)="setSourceFilter('icloud')"
      >
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>
        </svg>
        <span>iCloud</span>
      </button>
      <button
        class="seg-btn seg-btn--iphone"
        role="tab"
        [class.active]="sourceFilter() === 'iphone'"
        [attr.aria-selected]="sourceFilter() === 'iphone'"
        (click)="setSourceFilter('iphone')"
      >
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/>
        </svg>
        <span>iPhone</span>
      </button>
    </div>
  </div>

  <div class="toolbar-right">
    <div class="view-options">
      <button
        class="view-options-btn"
        [class.active]="viewOptionsOpen()"
        (click)="toggleViewOptions($event)"
        title="Opcje widoku"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M4.93 4.93a10 10 0 0 0 0 14.14"/>
          <line x1="12" y1="2" x2="12" y2="5"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="5" y2="12"/>
          <line x1="19" y1="12" x2="22" y2="12"/>
        </svg>
        Widok
        <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      @if (viewOptionsOpen()) {
        <div class="view-options-panel">
          <label class="view-option-item" (click)="toggleShowDetails($event)">
            <span class="view-option-label">Wyświetl szczegóły</span>
            <div class="toggle-switch" [class.on]="showDetails()">
              <div class="toggle-thumb"></div>
            </div>
          </label>
          <div class="view-option-divider"></div>
          <div class="view-option-columns">
            <span class="view-option-label">Zdjęcia w wierszu</span>
            <div class="columns-picker">
              @for (n of columnOptions; track n) {
                <button
                  class="col-btn"
                  [class.active]="columnsPerRow() === n"
                  (click)="setColumnsPerRow(n, $event)"
                >{{ n }}</button>
              }
            </div>
          </div>
          <div class="view-option-divider"></div>
          <label class="view-option-item" (click)="toggleGroupByDays($event)">
            <span class="view-option-label">Grupuj po dniach</span>
            <div class="toggle-switch" [class.on]="groupingMode() !== 'none'">
              <div class="toggle-thumb"></div>
            </div>
          </label>
          <label class="view-option-item" [class.view-option-item--indented]="true" (click)="toggleGroupByHours($event)">
            <span class="view-option-label view-option-label--sub">Grupuj po godzinach</span>
            <div class="toggle-switch" [class.on]="groupingMode() === 'hour'">
              <div class="toggle-thumb"></div>
            </div>
          </label>
          <div class="view-option-divider"></div>
          <button class="view-option-action-btn" (click)="onSelectVideoPreviews($event)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
            </svg>
            Zaznacz wszystkie podglądy video
          </button>
        </div>
      }
    </div>
  </div>
</div>
