<div class="toolbar">
  <div class="toolbar-left">
    <div class="toggle-group">
      <button
        class="toggle-btn"
        [class.active]="granularity() === 'year'"
        (click)="setGranularity('year')"
      >Year</button>
      <button
        class="toggle-btn"
        [class.active]="granularity() === 'month'"
        (click)="setGranularity('month')"
      >Month</button>
    </div> 
  </div>

</div>
