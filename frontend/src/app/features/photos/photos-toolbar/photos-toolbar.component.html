<div class="toolbar">
  <div class="toolbar-left">
    <select
      class="account-select"
      [ngModel]="selectedAccountId()"
      (ngModelChange)="onAccountChange($event)"
    >
      <option value="">Select account...</option>
      @for (acc of accounts(); track acc.id) {
        <option [value]="acc.id">{{ acc.displayName || acc.appleId }}</option>
      }
    </select>

    <div class="toggle-group">
      <button
        class="toggle-btn"
        [class.active]="granularity() === 'year'"
        (click)="setGranularity('year')"
      >Year</button>
      <button
        class="toggle-btn"
        [class.active]="granularity() === 'month'"
        (click)="setGranularity('month')"
      >Month</button>
    </div>
  </div>

  <div class="toolbar-right">
    <button
      class="btn btn-primary"
      (click)="syncRequested.emit()"
      [disabled]="!canSync() || syncing()"
    >
      @if (!syncing()) {
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      } @else {
        <span class="spinner spinner-white"></span>
      }
      {{ syncing() ? 'Syncing...' : 'Sync' }}
    </button>
  </div>
</div>
