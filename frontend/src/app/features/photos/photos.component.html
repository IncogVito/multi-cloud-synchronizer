<div class="photos-page">
  <app-photos-toolbar
    [granularity]="granularity()"
    [syncing]="syncing()"
    [canSync]="!!storageDeviceId()"
    [sourceFilter]="sourceFilter()"
    (granularityChanged)="onGranularityChanged($event)"
    (syncRequested)="onSyncRequested()"
    (sourceFilterChanged)="onSourceFilterChanged($event)"
  ></app-photos-toolbar>

  <app-sync-progress [event]="syncProgress()"></app-sync-progress>

  <app-missing-thumbnails-banner
    [storageDeviceId]="storageDeviceId()"
    [selectedPhotoIds]="selectedMissingThumbnailIds()"
    [deleteStatus]="operationStatus()"
    (thumbnailsGenerated)="onThumbnailsGenerated()"
  ></app-missing-thumbnails-banner>

  <div class="photos-layout">
    @if (monthsSummary().length > 0) {
      <nav class="months-toc" aria-label="Browse by month">
        <div class="months-toc__header">By month</div>
        <app-months-nav
          [monthsSummary]="monthsSummary()"
          [activeMonth]="activeMonth()"
          [sourceFilter]="sourceFilter()"
          (monthSelected)="onMonthSelected($event)"
        ></app-months-nav>
      </nav>
    }

    <div class="photos-main">
      <app-photo-timeline
        [groups]="groups()"
        [selectedIds]="selectedIds()"
        [thumbnailUrls]="thumbnailUrls()"
        [loading]="loading()"
        [loadingMore]="loadingMore()"
        [hasMore]="hasMore()"
        [loadError]="loadError() ?? ''"
        (photoClicked)="onPhotoClicked($event)"
        (selectionChanged)="onSelectionChanged($event)"
        (loadMoreRequested)="onLoadMoreRequested()"
        (scrolled)="onScrolled()"
        (thumbnailNeeded)="onThumbnailNeeded($event)"
      ></app-photo-timeline>
    </div>
  </div>

  <app-batch-actions-bar
    [selectedCount]="selectedIds().size"
    [selectedSize]="selectedSize()"
    [canDelete]="canDeleteSelected()"
    [missingThumbnailCount]="selectedMissingThumbnailIds().length"
    (deleteFromICloud)="onDeleteFromICloud()"
    (deleteFromIPhone)="onDeleteFromIPhone()"
    (generateThumbnails)="onGenerateThumbnailsForSelected()"
    (clearSelection)="clearSelection()"
  ></app-batch-actions-bar>

  <app-photo-detail-modal
    [photo]="detailPhoto()"
    [imageUrl]="detailImageUrl()"
    [loading]="!detailImageUrl() && !!detailPhoto()"
    (closed)="onDetailClosed()"
    (deleteFromICloud)="onDetailDeleteFromICloud($event)"
    (deleteFromIPhone)="onDetailDeleteFromIPhone($event)"
  ></app-photo-detail-modal>
</div>
