<div class="dashboard">
  <div class="dashboard-header">
    <h1>Dashboard</h1>
  </div>

  <app-active-context-card></app-active-context-card>

  <app-device-status-panel></app-device-status-panel>

  <app-storage-stats-card (reindexRequested)="onReindexRequested()"></app-storage-stats-card>

  <app-sync-section></app-sync-section>

  <app-reorganize-section></app-reorganize-section>

  <app-accounts-panel
    (addAccountRequested)="onAddAccountRequested()"
    (reconnectRequested)="onReconnectRequested($event)"
  ></app-accounts-panel>

  <app-add-account-modal
    [visible]="showModal()"
    [reconnectFor]="reconnectAccount()"
    (closed)="onModalClosed()"
    (accountAdded)="onAccountAdded()"
  ></app-add-account-modal>
</div>

@if (showScanningModal()) {
  <app-disk-scanning-modal (closed)="onScanningModalClosed()"></app-disk-scanning-modal>
}
