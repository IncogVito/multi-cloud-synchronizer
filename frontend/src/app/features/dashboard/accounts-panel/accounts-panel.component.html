<section class="section">
  <div class="section-header">
    <h2>iCloud Accounts</h2>
    <button class="btn btn-primary" (click)="addAccountRequested.emit()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add Account
    </button>
  </div>

  <div *ngIf="loadingAccounts" class="loading-state">
    <span class="spinner"></span> Loading accounts...
  </div>

  <div *ngIf="accountsError" class="error-state">
    {{ accountsError }}
  </div>

  <div class="accounts-list" *ngIf="!loadingAccounts">
    <div *ngIf="accounts.length === 0 && !accountsError" class="empty-state">
      No iCloud accounts configured. Add one to get started.
    </div>

    <div class="card account-card" *ngFor="let account of accounts">
      <div class="account-card-header">
        <div class="account-info">
          <span class="account-name">{{ account.displayName || account.appleId }}</span>
          <span class="account-id">{{ account.appleId }}</span>
        </div>
        <div class="account-actions">
          <span class="status-badge" [class]="account.hasActiveSession ? 'connected' : 'disconnected'">
            {{ account.hasActiveSession ? 'Active' : 'Inactive' }}
          </span>
          <button
            class="btn btn-danger btn-sm"
            (click)="deleteAccount(account)"
            title="Delete account"
          >
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14H6L5 6"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 6V4h6v2"/>
            </svg>
            Delete
          </button>
        </div>
      </div>
      <div class="account-meta" *ngIf="account.lastSyncAt">
        <span class="meta-label">Last sync:</span>
        <span class="meta-value">{{ account.lastSyncAt | date:'medium' }}</span>
      </div>
    </div>
  </div>
</section>
