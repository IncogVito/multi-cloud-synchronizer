name: Deploy to Server

on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'icloud-service/**'
      - 'compose.yaml'
  workflow_dispatch:

permissions: write-all

env:
  REGISTRY: docker.io
  IMAGE_NAME_BACKEND: wdrozdzowski/multi-cloud-synchronizer-backend
  IMAGE_NAME_FRONTEND: wdrozdzowski/multi-cloud-synchronizer-frontend
  IMAGE_NAME_ICLOUD: wdrozdzowski/multi-cloud-synchronizer-icloud-service

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag_version.outputs.new_tag }}
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      icloud_service: ${{ steps.changes.outputs.icloud_service }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v2
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            icloud_service:
              - 'icloud-service/**'

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Print new tag
        run: echo 'Deployed version ${{ steps.tag_version.outputs.new_tag }}'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push backend image
        if: ${{ steps.changes.outputs.backend == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ steps.tag_version.outputs.new_tag }}, ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest

      - name: Build and push frontend image
        if: ${{ steps.changes.outputs.frontend == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ steps.tag_version.outputs.new_tag }}, ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest

      - name: Build and push icloud-service image
        if: ${{ steps.changes.outputs.icloud_service == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: ./icloud-service
          file: ./icloud-service/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ICLOUD }}:${{ steps.tag_version.outputs.new_tag }}, ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ICLOUD }}:latest

      - name: Upload deploy artifacts
        uses: actions/upload-artifact@v4.4.0
        with:
          name: deploy-artifacts
          path: |
            compose.yaml

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download deploy artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          name: deploy-artifacts

      - name: Copy compose.yaml and scripts to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_V2_TUNNEL_HOSTNAME }}
          username: ${{ secrets.SERVER_V2_USER }}
          key: ${{ secrets.SERVER_V2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_V2_SSH_PORT }}

          proxy_host: ${{ secrets.SERVER_HOST }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SERVER_SSH_KEY }}
          proxy_port: ${{ secrets.SERVER_SSH_PORT }}
          proxy_passphrase: ${{ secrets.SERVER_SSH_PASSWORD }}
          source: "compose.yaml"
          target: "/home/${{ secrets.SERVER_V2_USER }}/docker-apps/multi-cloud-synchronizer/app"

      - name: Creating .env file on server and running the app
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_V2_TUNNEL_HOSTNAME }}
          username: ${{ secrets.SERVER_V2_USER }}
          key: ${{ secrets.SERVER_V2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_V2_SSH_PORT }}

          proxy_host: ${{ secrets.SERVER_HOST }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SERVER_SSH_KEY }}
          proxy_port: ${{ secrets.SERVER_SSH_PORT }}
          proxy_passphrase: ${{ secrets.SERVER_SSH_PASSWORD }}
          script: |
            set -e

            APP_DIR="/home/${{ secrets.SERVER_V2_USER }}/docker-apps/multi-cloud-synchronizer/app"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            cat > .env <<EOF
            BACKEND_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ needs.build.outputs.backend == 'true' && needs.build.outputs.version || 'latest' }}
            FRONTEND_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ needs.build.outputs.frontend == 'true' && needs.build.outputs.version || 'latest' }}
            ICLOUD_SERVICE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ICLOUD }}:${{ needs.build.outputs.icloud_service == 'true' && needs.build.outputs.version || 'latest' }}
            FRONTEND_PORT=${{ 3003 }}

            DB_PATH_HOST=${{ secrets.DB_PATH_HOST }}
            EXTERNAL_DRIVE_PATH_HOST=${{ secrets.EXTERNAL_DRIVE_PATH_HOST }}
            IPHONE_HOST_MOUNT_PATH=${{ secrets.IPHONE_MOUNT_PATH_HOST }}

            APP_USERNAME=${{ secrets.APP_USERNAME }}
            APP_PASSWORD=${{ secrets.APP_PASSWORD }}

            ICLOUD_SERVICE_URL=http://icloud-service:8000
            EXTERNAL_DRIVE_PATH_CONTAINER=/mnt/external-drive
            IPHONE_MOUNT_PATH_CONTAINER=/mnt/iphone
            
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            OPENROUTER_MODEL=google/gemini-2.0-flash-001
            EOF

            chmod 600 .env || true

            docker compose pull || true
            docker compose down || true
            docker compose up -d

      - name: Cleanup on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_V2_TUNNEL_HOSTNAME }}
          username: ${{ secrets.SERVER_V2_USER }}
          key: ${{ secrets.SERVER_V2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_V2_SSH_PORT }}

          proxy_host: ${{ secrets.SERVER_HOST }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SERVER_SSH_KEY }}
          proxy_port: ${{ secrets.SERVER_SSH_PORT }}
          proxy_passphrase: ${{ secrets.SERVER_SSH_PASSWORD }}
          script: |
            cd /home/${{ secrets.SERVER_V2_USER }}/docker-apps/multi-cloud-synchronizer/app
            rm -f .env || true
            docker image prune -f || true
