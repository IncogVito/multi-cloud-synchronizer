micronaut:
  application:
    name: cloud-synchronizer-backend
  server:
    port: 8080
  http:
    client:
      max-content-length: 524288000  # 500 MB
      read-timeout: 30s
      connect-timeout: 10s
  router:
    static-resources:
      swagger:
        paths: classpath:META-INF/swagger
        mapping: /swagger/**
      swagger-ui:
        paths: classpath:META-INF/swagger/views/swagger-ui
        mapping: /swagger-ui/**
  security:
    enabled: true
    authentication: basic
    intercept-url-map:
      - pattern: /api/health
        access:
          - isAnonymous()
      - pattern: /health
        access:
          - isAnonymous()
      - pattern: /swagger/**
        access:
          - isAnonymous()
      - pattern: /swagger-ui/**
        access:
          - isAnonymous()
      - pattern: /api/accounts/login
        access:
          - isAnonymous()
      - pattern: /api/accounts/2fa
        access:
          - isAnonymous()
      - pattern: /api/accounts
        access:
          - isAnonymous()
      - pattern: /api/setup/**
        access:
          - isAnonymous()
      - pattern: /**
        access:
          - isAuthenticated()
  endpoints:
    health:
      enabled: true
      sensitive: false

datasources:
  default:
    url: ${DATASOURCE_URL:jdbc:sqlite:/data/cloud-sync.db?journal_mode=WAL}
    driverClassName: org.sqlite.JDBC
    connectionTestQuery: SELECT 1
    maximumPoolSize: 1
flyway:
  datasources:
    default:
      enabled: true

icloud:
  service:
    url: ${ICLOUD_SERVICE_URL:http://localhost:8000}

openrouter:
  api-key: ${OPENROUTER_API_KEY:}
  model: ${OPENROUTER_MODEL:google/gemini-2.0-flash-001}

app:
  username: ${APP_USERNAME:admin}
  password: ${APP_PASSWORD:changeme}
  external-drive-path: ${EXTERNAL_DRIVE_PATH_CONTAINER}
  scripts-dir: ${SCRIPTS_DIR:/scripts}
  iphone-mount-path: ${IPHONE_MOUNT_PATH_CONTAINER:/mnt/iphone}

---
micronaut:
  environments: dev

datasources:
  default:
    url: jdbc:sqlite:./dev-cloud-sync.db?journal_mode=WAL

flyway:
  datasources:
    default:
      enabled: true

---
micronaut:
  environments: docker

datasources:
  default:
    url: ${DATASOURCE_URL:`jdbc:sqlite:./cloud-sync.db?journal_mode=WAL`}

flyway:
  datasources:
    default:
      enabled: true