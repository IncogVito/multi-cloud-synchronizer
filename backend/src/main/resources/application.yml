micronaut:
  application:
    name: cloud-synchronizer-backend
  server:
    port: 8080
  security:
    enabled: true
    authentication: basic
    intercept-url-map:
      - pattern: /api/health
        access:
          - isAnonymous()
      - pattern: /health
        access:
          - isAnonymous()
      - pattern: /**
        access:
          - isAuthenticated()
  endpoints:
    health:
      enabled: true
      sensitive: false

datasources:
  default:
    url: ${DATASOURCE_URL:`jdbc:sqlite:${EXTERNAL_DRIVE_PATH:/mnt/external-drive}/cloud-sync.db?journal_mode=WAL`}
    driverClassName: org.sqlite.JDBC
    connectionTestQuery: SELECT 1
    maximumPoolSize: 1
flyway:
  datasources:
    default:
      enabled: true

icloud:
  service:
    url: ${ICLOUD_SERVICE_URL:http://localhost:8000}

app:
  username: ${APP_USERNAME:admin}
  password: ${APP_PASSWORD:changeme}
  thumbnail-dir: ${THUMBNAIL_DIR:/mnt/external-drive/thumbnails}
  scripts-dir: ${SCRIPTS_DIR:/scripts}

---
micronaut:
  environments: dev

datasources:
  default:
    url: jdbc:sqlite:./dev-cloud-sync.db?journal_mode=WAL

flyway:
  datasources:
    default:
      enabled: true

---
micronaut:
  environments: docker

datasources:
  default:
    url: ${DATASOURCE_URL:`jdbc:sqlite:./cloud-sync.db?journal_mode=WAL`}

flyway:
  datasources:
    default:
      enabled: true