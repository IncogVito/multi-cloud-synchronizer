version: '3.8'

# Uruchamia tylko backend (bez icloud-service)
# Usage:
#   docker compose -f compose.dev.yaml up --build

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    network_mode: host
    environment:
      - MICRONAUT_ENVIRONMENTS=dev
      - APP_USERNAME=${APP_USERNAME:-admin}
      - APP_PASSWORD=${APP_PASSWORD:-changeme}
      - ICLOUD_SERVICE_URL=${ICLOUD_SERVICE_URL:-http://localhost:8000}
      - EXTERNAL_DRIVE_PATH_HOST=${EXTERNAL_DRIVE_PATH_HOST}
      - EXTERNAL_DRIVE_PATH_CONTAINER=${EXTERNAL_DRIVE_PATH_CONTAINER}
      - SCRIPTS_DIR=/scripts/dev
      - IPHONE_MOUNT_PATH_CONTAINER=${IPHONE_MOUNT_PATH_CONTAINER}
    volumes:
      - ./dev-drive:${EXTERNAL_DRIVE_PATH_CONTAINER}
      - type: bind
        source: ${IPHONE_MOUNT_PATH_HOST}
        target: ${IPHONE_MOUNT_PATH_CONTAINER}
        bind:
          create_host_path: true
          propagation: rshared
      - ../scripts:/scripts:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  dev-drive:
    driver: local
